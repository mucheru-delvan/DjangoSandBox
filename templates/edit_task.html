<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - Django ToDo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .edit-card {
            max-width: 600px;
            margin: 100px auto;
            border: none;
            border-radius: 15px;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card edit-card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary fw-bold">Edit Task</h3>
                
                <form action="{% url 'edit_task' get_task.pk %}" method="POST">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="task" class="form-control p-3" placeholder="Update your task..." value="{{ get_task.task }}" required>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fa fa-check me-2"></i> Update
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="btn btn-link text-muted text-decoration-none">
                        <i class="fa fa-arrow-left"></i> Back to My Day
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
