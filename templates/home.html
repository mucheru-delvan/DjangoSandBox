<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django ToDo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .task-container {
            height: 500px; 
            overflow-y: auto;
            padding-right: 10px;
        }
        /* Custom scrollbar for a cleaner look */
        .task-container::-webkit-scrollbar {
            width: 6px;
        }
        .task-container::-webkit-scrollbar-thumb {
            background-color: #d1d1d1;
            border-radius: 10px;
        }
        .card {
            border: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-6 fw-bold text-primary">Django ToDo App</h1>
            <p class="text-muted"><i class="fa fa-calendar"></i> {% now "jS F Y" %}</p>
        </header>

        <div class="row g-4">
            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">My Day</h4>
                    <span class="badge bg-primary rounded-pill">{{ tasks|length }} Pending</span>
                </div>
                
                <div class="task-container">
                    {% for task in tasks %}
                    <div class="card shadow-sm mb-3">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <span class="fw-medium">{{ task.task }}</span>
                            <div class="btn-group ms-3">
                                <a href="{% url 'mark_as_done' task.pk %}" class="btn btn-sm btn-outline-success" title="Done">
                                    <i class="fa fa-check"></i>
                                </a>
                                <a href="{% url 'edit_task' task.pk %}" class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="fa fa-pencil"></i>
                                </a>
                                <a href="{% url 'delete_task' task.pk %}" class="btn btn-sm btn-outline-danger" title="Delete">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    {% empty %}
                    <div class="text-center mt-5">
                        <p class="text-muted italic">No tasks for today. Relax! ☕</p>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="col-md-5">
                <h5 class="text-muted mb-3">Completed</h5>
                <div class="task-container" style="height: 400px;">
                    {% for task in completed_tasks %}
                    <div class="card mb-2 bg-light border-0">
                        <div class="card-body d-flex justify-content-between align-items-center py-2">
                            <span class="text-decoration-line-through text-muted">{{ task.task }}</span>
                            <a href="{% url 'mark_as_not_done' task.pk %}" class="btn btn-link btn-sm text-warning"> 
                                <i class="fa fa-undo"></i>
                            </a>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-7">
                <form action="{% url 'addTask' %}" method="POST" class="shadow-sm p-2 bg-white rounded-3">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="task" class="form-control border-0 px-3" placeholder="What needs to be done?" required>
                        <button type="submit" class="btn btn-primary px-4 rounded-3">
                            <i class="fa fa-plus me-2"></i>Add Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
